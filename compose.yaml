services:
    web:
        image: suryami62
        build:
            context: .
            dockerfile: suryami62/Dockerfile
        container_name: suryami62_web
        restart: unless-stopped
        ports:
            - "8080:8080"
            - "8081:8081"
        depends_on:
            db:
                condition: service_healthy
        environment:
            ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
            Security__CanonicalBaseUrl: ${CANONICAL_BASE_URL:-http://localhost:8080}
            Security__AdminAccess__AllowedUserNames__0: ${ADMIN_ACCESS_USERNAME_0:-}
            Security__AdminAccess__AllowedUserNames__1: ${ADMIN_ACCESS_USERNAME_1:-}
            Security__AdminAccess__AllowedEmails__0: ${ADMIN_ACCESS_EMAIL_0:-}
            Security__AdminAccess__AllowedEmails__1: ${ADMIN_ACCESS_EMAIL_1:-}
        volumes:
            - ./uploads:/app/wwwroot/img/uploads:Z
            - suryami62-dpkeys:/home/app/.aspnet/DataProtection-Keys
        networks:
            - backend

    db:
        image: postgres:18-alpine
        container_name: suryami62_db
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
            PGDATA: /var/lib/postgresql/data/pgdata
        volumes:
            - suryami62-db:/var/lib/postgresql/data
        networks:
            - backend
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\"" ]
            interval: 10s
            timeout: 5s
            retries: 5

networks:
    backend:
        internal: true

volumes:
    suryami62-db:
    suryami62-dpkeys: